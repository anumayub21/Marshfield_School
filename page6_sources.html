<!-- Main Content -->
<!-- Main Content -->
<div class="container"> <!-- Main box that holds the page content -->

    <h2>Sources Database Search</h2> <!-- Heading for the search section -->

    <form id="sourcesSearchForm"> <!-- Search form for the sources database -->

      <div class="form-row"> <!-- One row of the form -->
        <label>School Name</label> <!-- Label shown to the user -->
        <select id="SchoolName" name="SchoolName"> <!-- Dropdown list for school name -->
          <option value="">-- Any --</option> <!-- Default option: no filter -->
          <option value="Marshfield School">Marshfield School</option> <!-- School option 1 -->
          <option value="Thornton Lane Board School">Thornton Lane Board School</option> <!-- School option 2 -->
          <option value="Chapel Green Board School">Chapel Green Board School</option> <!-- School option 3 -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row of the form -->
        <label>Source Type</label> <!-- Label shown to the user -->
        <select id="SourceType" name="SourceType"> <!-- Dropdown for source type -->
          <option value="">-- Any --</option> <!-- Default option -->
          <option value="Log Book">Log Book</option> <!-- Source type option -->
          <option value="Admissions Register">Admissions Register</option> <!-- Source type option -->
          <option value="Photograph">Photograph</option> <!-- Source type option -->
          <option value="Map">Map</option> <!-- Source type option -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row -->
        <label>Department</label> <!-- Label shown to the user -->
        <select id="Department" name="Department"> <!-- Dropdown for department -->
          <option value="">-- Any --</option> <!-- Default option -->
          <option value="Junior">Junior</option> <!-- Department option -->
          <option value="Infant">Infant</option> <!-- Department option -->
          <option value="Admin">Admin</option> <!-- Department option -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row -->
        <label>Keyword</label> <!-- Label shown to the user -->
        <input type="text" id="Keyword" name="Keyword"> <!-- Text box where user types a keyword -->
      </div>

      <div class="form-row"> <!-- Final row for the search button -->
        <button type="submit">Search</button> <!-- When clicked, it starts the search -->
      </div>

    </form>

    <hr> <!-- Horizontal line to separate the form from the results -->

    <h2>Sources Search Results</h2> <!-- Heading for the results section -->

    <div class="button-row"> <!-- Row that holds the print button -->
      <button type="button" onclick="printResults()">Print Results</button> <!-- Calls the print function -->
    </div>

    <div id="results" style="margin-top: 30px;"></div> <!-- Empty area where search results will appear -->
</div>

<div class="footer">
    Community History Research by Ray Greenhough <!-- Footer text shown at the bottom -->
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Loads the Supabase library -->

<script>
  const supabaseUrl = "https://zvuepdhaofafwoiipqsv.supabase.co"; 
  // This is the web address of the Supabase project

  const supabaseKey = "sb_publishable_dnLjZNhuCtx2pWT-r8LUeA_S2_aBJmI"; 
  // This is the public key used to connect the page to Supabase

  const client = supabase.createClient(supabaseUrl, supabaseKey); 
  // Creates the connection between the webpage and the Supabase database

  function printResults() {
    window.print();
  }
  // This function opens the browser print window when the user clicks the print button

  document.getElementById("sourcesSearchForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    // Stops the page from refreshing when the form is submitted

    const schoolName = document.getElementById("SchoolName").value.trim();
    // Gets the selected school name and removes any extra spaces

    const sourceType = document.getElementById("SourceType").value.trim();
    // Gets the selected source type

    const department = document.getElementById("Department").value.trim();
    // Gets the selected department

    const keyword = document.getElementById("Keyword").value.trim();
    // Gets the keyword typed by the user

    const resultsDiv = document.getElementById("results");
    // Finds the results area on the page

    resultsDiv.innerHTML = "<p>Searching...</p>";
    // Shows a message so the user knows the search is happening

    let query = client.from("sources").select("*");
    // Starts a database query on the "sources" table
    // select("*") means get all columns

    if (schoolName !== "") {
      query = query.eq("School", schoolName);
    }
    // If the user chose a school, only show rows from that school

    if (sourceType !== "") {
      query = query.eq("Source type", sourceType);
    }
    // If the user chose a source type, only show rows with that type

    if (department !== "") {
      query = query.eq("Department", department);
    }
    // If the user chose a department, only show rows from that department

    if (keyword !== "") {
      query = query.or(`Source.ilike.%${keyword}%,Notes.ilike.%${keyword}%`);
    }
    // If the user typed a keyword, search for that keyword in the Source or Notes columns
    // ilike means it searches text without caring about capital/lowercase letters

    const { data, error } = await query;
    // Runs the query and stores the results in "data"
    // If something goes wrong, the problem is stored in "error"

    if (error) {
      resultsDiv.innerHTML = `<p>Error: ${error.message}</p>`;
      return;
    }
    // If there is an error, show the error message and stop the code

    if (!data || data.length === 0) {
      resultsDiv.innerHTML = "<p>No sources found.</p>";
      return;
    }
    // If no matching records are found, show a message

    let html = `<div id="results-summary">Total results: ${data.length}</div>`;
    // Starts building the HTML that will display on the page
    // Also shows the total number of results found

    data.forEach(row => {
      html += `
        <div class="result-box">
          <div class="result-title">${row["Source"] || "No title"}</div>

          <div class="result-item">
            <span class="result-label">Type:</span> ${row["Source type"] || ""}
          </div>

          <div class="result-item">
            <span class="result-label">School:</span> ${row["School"] || ""}
          </div>

          <div class="result-item">
            <span class="result-label">Department:</span> ${row["Department"] || ""}
          </div>

          <div class="result-item">
            <span class="result-label">Notes:</span> ${row["Notes"] || "Not available"}
          </div>

          <div class="result-item">
            <span class="result-label">Link:</span>
            ${row["Hyperlink"] ? `<a href="${row["Hyperlink"]}" target="_blank">View Source</a>` : "No link available"}
          </div>
        </div>
      `;
    });
    // This loop goes through each result from the database
    // and creates one result box for each source

    resultsDiv.innerHTML = html;
    // Puts the finished results onto the webpage

    resultsDiv.scrollIntoView({ behavior: "smooth" });
    // Automatically scrolls down to the results section smoothly
  });
</script>End of webpage content -->
</html><!-- End of the HTML document -->
