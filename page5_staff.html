<!-- Main Content -->
<div class="container"> <!-- Main box that holds all the content on the page -->

    <h2>Staff Database Search</h2> <!-- Heading for the staff search section -->

    <form id="staffSearchForm"> <!-- Search form for the staff database -->
      
      <div class="form-row"> <!-- One row of the form -->
        <label>School Name</label> <!-- Label shown to the user -->
        <select id="SchoolName" name="SchoolName"> <!-- Dropdown list for school name -->
          <option value="">-- Any --</option> <!-- Default option: no filter -->
          <option value="Marshfield School">Marshfield School</option> <!-- School option 1 -->
          <option value="Thornton Lane Board School">Thornton Lane Board School</option> <!-- School option 2 -->
          <option value="Chapel Green Board School">Chapel Green Board School</option> <!-- School option 3 -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row of the form -->
        <label>Department</label> <!-- Label shown to the user -->
        <select id="Dept" name="Dept"> <!-- Dropdown list for department -->
          <option value="">-- Any --</option> <!-- Default option -->
          <option value="Junior">Junior</option> <!-- Department option -->
          <option value="Infant">Infant</option> <!-- Department option -->
          <option value="Admin">Admin</option> <!-- Department option -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row -->
        <label>Last Name</label> <!-- Label shown to the user -->
        <input type="text" id="LastName" name="LastName"> <!-- Text box for entering a surname -->
      </div>

      <div class="form-row"> <!-- Another row -->
        <label>Position</label> <!-- Label shown to the user -->
        <select id="Position" name="Position"> <!-- Dropdown list for staff position -->
          <option value="">-- Any --</option> <!-- Default option -->
          <option value="Head Mistress">Head Mistress</option> <!-- Position option -->
          <option value="Assistant Mistress">Assistant Mistress</option> <!-- Position option -->
          <option value="Monitor">Monitor</option> <!-- Position option -->
          <option value="Candidate">Candidate</option> <!-- Position option -->
        </select>
      </div>

      <div class="form-row"> <!-- Another row -->
        <label>Start Year</label> <!-- Label shown to the user -->
        <input type="text" id="StartYear" name="StartYear"> <!-- Text box for entering a year -->
      </div>

      <div class="form-row"> <!-- Final row containing the button -->
        <button type="submit">Search</button> <!-- Starts the search when clicked -->
      </div>
    </form>

    <hr> <!-- Horizontal line to separate search area from results area -->

    <h2>Staff Search Results</h2> <!-- Heading for the results section -->

    <div class="button-row"> <!-- Row that holds the print button -->
      <button type="button" onclick="printResults()">Print Results</button> <!-- Calls the print function -->
    </div>

    <div id="results" style="margin-top: 30px;"></div> <!-- Empty area where search results will appear -->
</div>
